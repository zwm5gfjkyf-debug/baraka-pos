<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baraka POS</title>

<link rel="stylesheet" href="css/style.css">

<!-- Firebase -->
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script defer src="js/firebase.js"></script>
<script defer src="js/app.js"></script>
</head>

<body>

<!-- Loading Screen -->
<div id="loadingScreen" class="center-screen">
  <h2>Loading...</h2>
</div>

<!-- Auth Screen -->
<div id="authScreen" class="center-screen hidden">
  <div class="card auth-card">
    <h2>Baraka POS</h2>
    <input id="shopName" placeholder="Shop Name (register only)">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div> 
</div>

<!-- App Screen -->
<div id="appScreen" class="hidden">

  <!-- Top Header -->
  <header class="app-header">
    <h3 id="shopTitle">Baraka</h3>
    <button onclick="logout()">Logout</button>
  </header>

  <!-- Main Content -->
  <main id="mainContent">

    <div id="dashboardPage" class="page">
      <h2>Dashboard</h2>
      <div class="card">Today Sales: 0</div>
      <div class="card">Week Sales: 0</div>
      <div class="card">Month Sales: 0</div>
    </div>

    <div id="salePage" class="page hidden">
      <h2>Sotuv</h2>
    </div>

    <div id="debtPage" class="page hidden">
      <h2>Nasiya</h2>
    </div>

   <div id="stockPage" class="page hidden">

  <h2>Zaxira (Stock)</h2>

  <div class="card">
    <input id="stockName" placeholder="Mahsulot nomi">
    <input id="stockQty" type="number" placeholder="Kelgan miqdor">
    <input id="stockCost" type="number" placeholder="Kelgan narx (cost price)">
    <button onclick="addStock()">Qo'shish</button>
  </div>

  <div id="currentStockList"></div>

</div>

    <div id="analyticsPage" class="page hidden">
      <h2>Tahlil</h2>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button onclick="navigate('dashboardPage')">Home</button>
    <button onclick="navigate('salePage')">Sotuv</button>
    <button onclick="navigate('debtPage')">Nasiya</button>
    <button onclick="navigate('stockPage')">Zaxira</button>
    <button onclick="navigate('analyticsPage')">Tahlil</button>
  </nav>

</div>

</body>
</html>
