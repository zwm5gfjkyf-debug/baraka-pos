<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baraka POS</title>

<link rel="stylesheet" href="css/style.css">

<!-- Chart.js for Analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script defer src="js/firebase.js"></script>
<script defer src="js/app.js"></script>
</head>

<body>

<!-- ================= LOADING ================= -->
<div id="loadingScreen" class="center-screen">
  <h2>Yuklanmoqda...</h2>
</div>

<!-- ================= AUTH ================= -->
<div id="authScreen" class="center-screen hidden">
  <div class="card auth-card">
    <h2>Baraka POS</h2>
    <input id="shopName" placeholder="Do'kon nomi (ro'yxatdan o'tishda)">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Parol">
    <button onclick="register()">Ro'yxatdan o'tish</button>
    <button onclick="login()">Kirish</button>
  </div>
</div>

<!-- ================= MAIN APP ================= -->
<div id="appScreen" class="hidden">

  <!-- HEADER -->
  <header class="app-header">
    <div>
      <div style="font-size:13px;color:var(--text-soft)">Do'kon</div>
      <div id="shopTitle" style="font-weight:600"></div>
    </div>

    <div style="position:relative">
      <button onclick="toggleProfileMenu()" style="background:none;font-size:18px">☰</button>

      <div id="profileMenu" class="card hidden"
           style="position:absolute; right:0; top:45px; width:160px;">
        <button onclick="logout()" style="background:var(--danger); width:100%">
          Chiqish
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboardPage" class="page">

      <div class="dashboard-card">
        <div class="dashboard-title">Bugungi tushum</div>
        <div class="dashboard-amount">
          <span id="todaySales">0</span> so'm
        </div>
      </div>

      <div class="dashboard-card">
        <div class="dashboard-title">Haftalik tushum</div>
        <div class="dashboard-amount">
          <span id="weekSales">0</span> so'm
        </div>
      </div>

      <div class="dashboard-card">
        <div class="dashboard-title">Oylik tushum</div>
        <div class="dashboard-amount">
          <span id="monthSales">0</span> so'm
        </div>
      </div>

    </div>

    <!-- ================= SOTUV ================= -->
    <div id="salePage" class="page hidden">

      <h2>Sotuv (Naqd)</h2>

      <div class="card">
        <input id="saleSearch"
               placeholder="Mahsulot qidirish..."
               oninput="searchProducts(this.value)">
        <div id="searchResults"></div>
      </div>

      <div id="cartList"></div>

      <div class="card">
        <h3>Jami: <span id="saleTotal">0</span> so'm</h3>
        <button onclick="focusSaleSearch()">
  + Yana tovar qo'shish
</button>
        <button id="completeSaleBtn" onclick="completeSale()">
          Sotuvni yakunlash
        </button>
      </div>

    </div>

    <!-- ================= NASIYA ================= -->
    <div id="debtPage" class="page hidden">

      <h2>Nasiya savdo</h2>

      <!-- New Debt Sale -->
      <div class="card">
        <input id="debtCustomerName" placeholder="Mijoz ismi">
        <input id="debtSearch"
               placeholder="Mahsulot qidirish..."
               oninput="searchDebtProducts(this.value)">
        <div id="debtSearchResults"></div>
        <div id="debtCartList"></div>
        <button onclick="completeDebtSale()">Nasiya berish</button>
      </div>

      <!-- Debt List -->
      <div class="card">
        <h3>Mijozlar qarzdorligi</h3>
        <div id="debtCustomersList"></div>
      </div>

    </div>
 
    <!-- ================= ZAXIRA ================= -->
    <div id="stockPage" class="page hidden">

      <h2>Zaxira</h2>

     <div class="card">
  <input id="stockName" placeholder="Mahsulot nomi">
  <input id="stockQty" type="number" placeholder="Kelgan miqdor">
  <input id="stockCost" type="number" placeholder="Kelgan narx (cost)">
  <input id="stockSellingPrice" type="number" placeholder="Sotish narxi">
  <button onclick="addStock()">Qo'shish</button>
</div>
      <div id="currentStockList"></div>

    </div>

    <!-- ================= TAHLIL ================= -->
    <div id="analyticsPage" class="page hidden">

      <h2>Tahlil</h2>

      <div class="chart-container">
        <canvas id="weeklyChart"></canvas>
      </div>

      <div class="chart-container">
        <canvas id="monthlyChart"></canvas>
      </div>

    </div>

  </main>

  <!-- ================= NAV ================= -->
  <nav class="bottom-nav">
    <button onclick="navigate('dashboardPage')" class="active">Asosiy</button>
    <button onclick="navigate('salePage')">Sotuv</button>
    <button onclick="navigate('debtPage')">Nasiya</button>
    <button onclick="navigate('stockPage')">Zaxira</button>
    <button onclick="navigate('analyticsPage')">Tahlil</button>
  </nav>

</div>
<!-- SUCCESS OVERLAY -->
<div id="successOverlay" class="hidden"
     style="
     position:fixed;
     inset:0;
     background:rgba(0,0,0,0.6);
     display:flex;
     align-items:center;
     justify-content:center;
     z-index:9999;
     backdrop-filter: blur(6px);">

  <div style="
      background:linear-gradient(135deg,#10b981,#059669);
      padding:40px 60px;
      border-radius:20px;
      font-size:26px;
      font-weight:700;
      color:white;
      text-align:center;
      animation:popIn 0.3s ease;">
      <div id="successText">Muvaffaqiyatli</div>
  </div>
</div>
</body>
</html>
