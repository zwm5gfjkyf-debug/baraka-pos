<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Baraka POS</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2838/2838895.png">

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOADING -->

<div id="loadingScreen" class="center-screen">

<div class="loading-card">

<div class="loader"></div>

<h2>Baraka POS yuklanmoqda...</h2>

</div>

</div>


<!-- AUTH -->

<div id="authScreen" class="center-screen hidden">

<div class="auth-container">

<div class="auth-card glass">

<h1>Baraka POS</h1>

<p class="auth-sub">Biznesingiz uchun zamonaviy POS</p>

<input id="shopName" placeholder="Do'kon nomi">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Parol">

<button class="btn-primary" onclick="register()">
Ro'yxatdan o'tish
</button>

<button class="btn-secondary" onclick="login()">
Kirish
</button>

</div>

</div>

</div>



<!-- APP -->

<div id="appScreen" class="hidden">


<!-- HEADER -->

<header class="app-header glass">

<div>

<div class="shop-label">
Do'kon
</div>

<div id="shopTitle" class="shop-title"></div>

</div>

<button class="menu-btn" onclick="toggleProfileMenu()">☰</button>

<div id="profileMenu" class="profile-menu glass hidden">

<button onclick="logout()" class="danger-btn">
Chiqish
</button>

</div>

</header>



<!-- MAIN -->

<main class="main-content">


<!-- DASHBOARD -->

<div id="dashboardPage" class="page">

<div class="dashboard-grid">

<div class="dashboard-card glass">

<div class="card-title">
Bugungi tushum
</div>

<div id="todaySales" class="dashboard-amount">
0
</div>

</div>


<div class="dashboard-card glass">

<div class="card-title">
Haftalik tushum
</div>

<div id="weekSales" class="dashboard-amount">
0
</div>

</div>


<div class="dashboard-card glass">

<div class="card-title">
Oylik tushum
</div>

<div id="monthSales" class="dashboard-amount">
0
</div>

</div>

</div>

</div>



<!-- SALE -->

<div id="salePage" class="page hidden">

<h2 class="page-title">Naqd sotuv</h2>

<div class="glass dashboard-card">

<input
id="saleSearch"
placeholder="Mahsulot qidirish..."
oninput="searchProducts(this.value)"
>

<div id="searchResults"></div>

</div>

<div id="cartList"></div>

<div class="glass dashboard-card">

<h3>
Jami: <span id="saleTotal">0</span> so'm
</h3>

<button id="completeSaleBtn" onclick="completeSale()">
Sotuvni yakunlash
</button>

</div>

</div>



<!-- NASIYA -->

<div id="debtPage" class="page hidden">

<h2 class="page-title">Nasiya savdo</h2>

<div class="glass dashboard-card">

<input
id="debtCustomerName"
placeholder="Mijoz ismi"
>

<input
id="debtSearch"
placeholder="Mahsulot qidirish..."
oninput="searchDebtProducts(this.value)"
>

<div id="debtSearchResults"></div>

<div id="debtCartList"></div>

<button id="debtCompleteBtn" class="btn-primary" onclick="completeDebtSale()">
Nasiya berish
</button>

</div>

<div class="glass dashboard-card">

<h3>Mijozlar qarzdorligi</h3>

<div id="debtCustomersList"></div>

</div>

</div>



<!-- INVENTORY -->

<div id="stockPage" class="page hidden">

<h2 class="page-title">Zaxira</h2>

<div class="glass dashboard-card">

<input id="stockName" placeholder="Mahsulot nomi">

<input id="stockQty" placeholder="Miqdor">

<input id="stockCost" placeholder="Kelgan narx">

<input id="stockSellingPrice" placeholder="Sotish narxi">

<button class="btn-primary" onclick="addStock()">
Qo'shish
</button>

</div>

<div id="currentStockList"></div>

</div>



<!-- ANALYTICS -->

<div id="analyticsPage" class="page hidden">

<h2 class="page-title">Tahlil</h2>

<div class="chart-container glass">

<canvas id="weeklyChart"></canvas>

</div>

<div class="chart-container glass">

<canvas id="monthlyChart"></canvas>

</div>

</div>


</main>



<!-- NAVIGATION -->

<nav class="bottom-nav glass">

<button onclick="navigate('dashboardPage')" class="active">
Asosiy
</button>

<button onclick="navigate('salePage')">
Sotuv
</button>

<button onclick="navigate('debtPage')">
Nasiya
</button>

<button onclick="navigate('stockPage')">
Zaxira
</button>

<button onclick="navigate('analyticsPage')">
Tahlil
</button>

</nav>


</div>



<!-- SUCCESS -->

<div id="successOverlay" class="success-overlay hidden">

<div class="success-card">

<span id="successText">
Muvaffaqiyatli
</span>
<span id="todayRevenue"></span>
<span id="weekRevenue"></span>
<span id="monthRevenue"></span>
</div>

</div>



<script src="js/firebase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/navigation.js"></script>
<script src="js/sales.js"></script>
<script src="js/debt.js"></script>
<script src="js/stock.js"></script>
<script src="js/analytics.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
