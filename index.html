<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baraka POS</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2838/2838895.png">

<link rel="stylesheet" href="css/style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOADING -->

<div id="loadingScreen">
  <h2>Baraka POS yuklanmoqda...</h2>
</div>

<!-- AUTH SCREEN -->

<div id="authScreen" class="hidden">

  <h1>Baraka POS</h1>

  <input id="shopName" placeholder="Do'kon nomi">

  <input id="email" placeholder="Email">

  <input id="password" type="password" placeholder="Parol">

  <button onclick="register()">Ro'yxatdan o'tish</button>

  <button onclick="login()">Kirish</button>

</div>

<!-- MAIN APP -->

<div id="appScreen" class="hidden">

<header>

<div>
Do'kon:
<span id="shopTitle"></span>
</div>

<button onclick="toggleProfileMenu()">☰</button>

<div id="profileMenu" class="hidden">
<button onclick="logout()">Chiqish</button>
</div>

</header>

<main>

<!-- DASHBOARD -->

<div id="dashboardPage" class="page">

<h2>Asosiy</h2>

Bugungi tushum:
<span id="todaySales">0</span>

</div>

<!-- SALE -->

<div id="salePage" class="page hidden">

<h2>Naqd sotuv</h2>

<input
id="saleSearch"
placeholder="Mahsulot qidirish..."
oninput="searchProducts(this.value)"
>

<div id="searchResults"></div>

<div id="cartList"></div>

Jami:
<span id="saleTotal">0</span>

<button id="completeSaleBtn">
Sotuvni yakunlash
</button>

</div>

<!-- NASIYA -->

<div id="debtPage" class="page hidden">

<h2>Nasiya savdo</h2>

<input
id="debtCustomerName"
placeholder="Mijoz ismi"
>

<input
id="debtSearch"
placeholder="Mahsulot qidirish..."
oninput="searchDebtProducts(this.value)"
>
<div id="debtSearchResults"></div>

<div id="debtCartList"></div>

<button id="completeDebtBtn">
Nasiya berish
</button>

<div id="debtCustomersList"></div>

</div>

<!-- STOCK -->

<div id="stockPage" class="page hidden">

<h2>Zaxira</h2>

<input id="stockName" placeholder="Mahsulot nomi">

<input id="stockQty" type="number" placeholder="Miqdor">

<input id="stockCost" type="number" placeholder="Kelgan narx">

<input id="stockSellingPrice" type="number" placeholder="Sotish narxi">

<button onclick="addStock()">Qo'shish</button>

<div id="currentStockList"></div>

</div>

<!-- ANALYTICS -->

<div id="analyticsPage" class="page hidden">

<h2>Tahlil</h2>

<canvas id="weeklyChart"></canvas>

<canvas id="monthlyChart"></canvas>

</div>

</main>

<!-- NAVIGATION -->

<nav>

<button onclick="navigate('dashboardPage')">
Asosiy
</button>

<button onclick="navigate('salePage')">
Sotuv
</button>

<button onclick="navigate('debtPage')">
Nasiya
</button>

<button onclick="navigate('stockPage')">
Zaxira
</button>

<button onclick="navigate('analyticsPage')">
Tahlil
</button>

</nav>

</div>

<!-- SUCCESS OVERLAY -->

<div id="successOverlay" class="hidden">

<div>

<span id="successText">
Muvaffaqiyatli
</span>

</div>

</div>

<!-- JS FILES ORDER -->

<script src="js/firebase.js"></script>

<script src="js/utils.js"></script>

<script src="js/auth.js"></script>

<script src="js/navigation.js"></script>

<script src="js/sales.js"></script>

<script src="js/debt.js"></script>

<script src="js/stock.js"></script>

<script src="js/analytics.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

</body>
</html>
