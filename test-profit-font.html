<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Sizing Test</title>
    <style>
        .stat-card {
            width: 160px;
            height: 110px;
            background: #1976D2;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            margin: 10px;
        }

        .stat-card-secondary {
            background: #43A047;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.8;
        }

        .stat-value-container {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .stat-number {
            font-size: 26px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
        }

        .stat-som {
            font-size: 0.73em;
            font-weight: 500;
            color: white;
        }

        .stat-card-secondary .stat-som {
            color: #43A047;
        }

        #todayProfitValue + .stat-som {
            color: #43A047;
        }
    </style>
</head>
<body>
    <h1>Font Sizing Test for Profit Card</h1>

    <div class="stat-card stat-card-secondary">
        <div class="stat-label">BUGUNGI FOYDA</div>
        <div class="stat-value-container">
            <span id="todayProfitValue" class="stat-number">45 750 000</span>
            <span class="stat-som">so'm</span>
        </div>
        <div class="stat-helper">Test</div>
    </div>

    <script>
        function formatNumberWithSpaces(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        }

        function adjustFontSizeForProfitCard(element) {
            if (!element) return;

            const text = element.textContent;
            const charCount = text.length;

            let fontSize = 26; // Default size

            if (charCount > 9) {
                // Scale down for longer numbers
                if (charCount <= 11) {
                    fontSize = 22;
                } else if (charCount <= 13) {
                    fontSize = 18;
                } else if (charCount <= 15) {
                    fontSize = 16;
                } else {
                    fontSize = 14;
                }
            }

            element.style.fontSize = fontSize + 'px';
            console.log(`Profit card: "${text}" (${charCount} chars) -> ${fontSize}px`);
        }

        // Test the function
        const profitVal = document.getElementById('todayProfitValue');
        adjustFontSizeForProfitCard(profitVal);

        // Test with different values
        setTimeout(() => {
            profitVal.textContent = '1 000 000';
            adjustFontSizeForProfitCard(profitVal);
        }, 1000);

        setTimeout(() => {
            profitVal.textContent = '100 000 000 000';
            adjustFontSizeForProfitCard(profitVal);
        }, 2000);

        setTimeout(() => {
            profitVal.textContent = '999 999 999 999 999';
            adjustFontSizeForProfitCard(profitVal);
        }, 3000);
    </script>
</body>
</html>
